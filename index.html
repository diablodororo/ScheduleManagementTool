<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作排程系統</title>

  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 自訂拖曳時的視覺回饋樣式 */
    .drag-over-zone {
      background-color: #eff6ff !important;
      /* Tailwind blue-50 */
      border-color: #bfdbfe !important;
      /* Tailwind blue-200 */
    }

    .drag-over-pool {
      background-color: rgba(239, 246, 255, 0.5) !important;
      outline: 2px dashed #93c5fd !important;
      /* Tailwind blue-300 */
      outline-offset: -4px;
    }

    /* 隱藏捲軸但保留捲動功能 (選用) */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* 縮放把手：預設隱藏指示器，hover 時顯示 */
    /* 橫式把手 */
    .task-bar.horizontal .resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 16px;
      border-left: 2px dotted transparent;
      transition: border-color 0.15s;
    }

    /* 直式把手 */
    .task-bar.vertical .resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 3px;
      width: 20px;
      border-top: 2px dotted transparent;
      transition: border-color 0.15s;
    }

    .task-bar:hover .resize-handle::after {
      border-left-color: rgba(0, 0, 0, 0.35);
      border-top-color: rgba(0, 0, 0, 0.35);
    }

    .task-bar:hover .resize-handle {
      background: rgba(0, 0, 0, 0.08);
    }

    /* 縮放中顯示日期提示 */
    .resize-tooltip {
      position: fixed;
      pointer-events: none;
      background: #1e293b;
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 9999;
      transform: translate(-50%, -120%);
    }
  </style>
</head>

<body class="flex flex-col h-screen bg-white text-gray-800 font-sans overflow-hidden">
  <!-- 縮放時的日期提示 -->
  <div id="resize-tooltip" class="resize-tooltip" style="display:none;"></div>

  <!-- 上方：甘特圖時間軸主體 -->
  <div class="flex-1 flex flex-col min-w-0 min-h-0">

    <!-- 工具列與導航 -->
    <div class="h-14 border-b flex items-center justify-between px-6 bg-white shrink-0">
      <h1 class="text-xl font-bold flex items-center space-x-2">
        <i data-lucide="calendar" class="text-gray-600 w-6 h-6"></i>
        <span>長期專案排程甘特圖</span>
      </h1>
      <div class="flex items-center space-x-3">
        <div id="date-range-display" class="font-mono text-sm text-gray-500"></div>
        <button onclick="scrollToToday()" class="px-3 py-1.5 hover:bg-blue-50 rounded text-blue-600 border border-blue-200 shadow-sm text-sm font-bold flex items-center space-x-1">
          <i data-lucide="crosshair" class="w-4 h-4"></i>
          <span>今天</span>
        </button>
        <button onclick="toggleViewMode()" id="view-mode-btn" class="px-3 py-1.5 hover:bg-gray-100 rounded text-gray-600 border shadow-sm text-sm font-bold flex items-center space-x-1">
          <i data-lucide="columns-2" class="w-4 h-4"></i>
          <span>橫式</span>
        </button>
      </div>
    </div>

    <!-- 捲動區域 -->
    <div id="gantt-scroll" class="flex-1 overflow-auto relative bg-gray-50/30">
      <div class="min-w-max">

        <!-- 時間軸表頭 (X軸) -->
        <div id="gantt-header" class="flex border-b bg-white sticky top-0 z-30 shadow-sm">
          <!-- 表頭由 JS 動態生成 -->
        </div>

        <!-- 同仁列 (Y軸) -->
        <div id="gantt-body">
          <!-- 網格與任務由 JS 動態生成 -->
        </div>

      </div>
    </div>
  </div>

  <!-- 下方：未分配任務池（橫向） -->
  <div class="bg-gray-50 border-t z-20 shadow-[0_-2px_5px_-2px_rgba(0,0,0,0.1)] shrink-0">
    <div class="px-5 py-2 border-b bg-white flex items-center justify-between">
      <div class="flex items-center space-x-2 font-bold text-gray-700">
        <i data-lucide="briefcase" class="text-blue-600 w-5 h-5"></i>
        <span>待分配任務庫</span>
      </div>
      <div class="flex items-center space-x-2">
        <span id="unassigned-count" class="bg-blue-100 text-blue-800 text-xs py-1 px-2 rounded-full font-mono font-bold">
          0
        </span>
        <button onclick="openAddTaskModal()"
          class="w-7 h-7 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow flex items-center justify-center transition-all hover:scale-110 active:scale-95">
          <i data-lucide="plus" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <div id="pool-zone" class="flex items-start gap-3 p-3 overflow-x-auto transition-all"
      style="min-height: 80px;"
      ondragover="handleDragOver(event, 'pool-zone', true)" ondragleave="handleDragLeave(event, 'pool-zone', true)"
      ondrop="handleDrop(event, null, null, 'pool-zone', true)">
      <!-- 任務卡片將由 JS 動態生成 -->
    </div>
  </div>

  <!-- 新增工作 Modal -->
  <div id="add-task-modal" class="fixed inset-0 z-[9999] hidden">
    <div class="absolute inset-0 bg-black/40" onclick="closeAddTaskModal()"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-xl shadow-2xl w-[420px] max-w-[90vw]">
      <div class="flex items-center justify-between px-5 py-4 border-b">
        <h2 class="text-lg font-bold text-gray-800">新增工作</h2>
        <button onclick="closeAddTaskModal()" class="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-gray-600">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">工作名稱</label>
          <input id="new-task-title" type="text" placeholder="輸入工作名稱..."
            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm">
        </div>
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="block text-sm font-semibold text-gray-700 mb-1">預估工期（天）</label>
            <input id="new-task-duration" type="number" min="1" value="1"
              class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm">
          </div>
          <div class="flex-1">
            <label class="block text-sm font-semibold text-gray-700 mb-1">截止日期（選填）</label>
            <input id="new-task-deadline" type="date"
              class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">顏色標籤</label>
          <div id="color-picker" class="flex gap-2 flex-wrap"></div>
        </div>
      </div>
      <div class="px-5 py-4 border-t flex justify-end space-x-2">
        <button onclick="closeAddTaskModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
        <button onclick="addNewTask()" class="px-4 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-bold">新增</button>
      </div>
    </div>
  </div>

  <!-- 編輯工作 Modal -->
  <div id="edit-task-modal" class="fixed inset-0 z-[9999] hidden">
    <div class="absolute inset-0 bg-black/40" onclick="closeEditTaskModal()"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-xl shadow-2xl w-[420px] max-w-[90vw]">
      <div class="flex items-center justify-between px-5 py-4 border-b">
        <h2 class="text-lg font-bold text-gray-800">編輯工作</h2>
        <button onclick="closeEditTaskModal()" class="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-gray-600">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">工作名稱</label>
          <input id="edit-task-title" type="text"
            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm">
        </div>
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="block text-sm font-semibold text-gray-700 mb-1">工期（天）</label>
            <input id="edit-task-duration" type="number" min="1"
              class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm">
          </div>
          <div class="flex-1">
            <label class="block text-sm font-semibold text-gray-700 mb-1">截止日期（選填）</label>
            <input id="edit-task-deadline" type="date"
              class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">顏色標籤</label>
          <div id="edit-color-picker" class="flex gap-2 flex-wrap"></div>
        </div>
      </div>
      <div class="px-5 py-4 border-t flex justify-between">
        <button onclick="deleteEditingTask()" class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg font-bold flex items-center space-x-1">
          <i data-lucide="trash-2" class="w-4 h-4"></i>
          <span>刪除</span>
        </button>
        <div class="flex space-x-2">
          <button onclick="closeEditTaskModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
          <button onclick="saveEditTask()" class="px-4 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-bold">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- 核心常數與工具函數 ---
    const MS_PER_DAY = 1000 * 60 * 60 * 24;
    const CELL_WIDTH = 120;
    const ROW_MIN_HEIGHT = 80;
    const TASK_HEIGHT = 36;
    const TASK_GAP = 4;
    const DAY_NAMES = ['日', '一', '二', '三', '四', '五', '六'];
    const EXTEND_DAYS = 30;
    const EDGE_THRESHOLD = 600;
    const NAME_COL_WIDTH = 224;

    // 直式模式常數
    const V_ROW_HEIGHT = 52;      // 每天的列高
    const V_COL_WIDTH = 180;      // 每位同仁的欄寬
    const V_TASK_WIDTH = 140;     // 任務條寬度
    const V_DATE_COL_WIDTH = 100; // 左側日期欄寬

    const TODAY = new Date('2026-03-23');
    let viewMode = 'vertical'; // 'horizontal' | 'vertical'

    const formatDate = (date) => {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    };
    const parseDate = (str) => new Date(str + 'T00:00:00');
    const getDaysDiff = (d1, d2) => Math.round((d2 - d1) / MS_PER_DAY);
    const addDays = (date, days) => {
      const res = new Date(date);
      res.setDate(res.getDate() + days);
      return res;
    };

    // --- 初始狀態資料 ---
    const colleagues = [
      { id: 'c1', name: '王老師', role: '課程研發' },
      { id: 'c2', name: '林老師', role: '行為分析' },
      { id: 'c3', name: '陳治療師', role: '職能治療' },
    ];

    let tasks = [
      { id: 't1', title: '編寫適應體育教案', color: 'bg-blue-200 border-blue-400 text-blue-900', assigneeId: 'c1', startDate: '2026-03-23', endDate: '2026-03-26', duration: 4, deadline: null },
      { id: 't2', title: '設計行為介入方案(BIP)', color: 'bg-red-200 border-red-400 text-red-900', assigneeId: 'c2', startDate: '2026-03-24', endDate: '2026-03-25', duration: 2, deadline: null },
      { id: 't3', title: '跨專業團隊個案研討會', color: 'bg-amber-200 border-amber-400 text-amber-900', assigneeId: 'c1', startDate: '2026-03-25', endDate: '2026-03-25', duration: 1, deadline: null },
      { id: 't4', title: '感覺統合教具採購評估', color: 'bg-green-200 border-green-400 text-green-900', assigneeId: null, startDate: null, endDate: null, duration: 3, deadline: null },
      { id: 't5', title: '情境圖卡視覺教材繪製', color: 'bg-teal-200 border-teal-400 text-teal-900', assigneeId: null, startDate: null, endDate: null, duration: 2, deadline: null },
    ];

    // 時間軸起訖（會動態延伸）
    let timelineStart = addDays(TODAY, -14);
    let timelineEnd = addDays(TODAY, 60);
    let isExtending = false;

    // --- 新增工作相關 ---
    const TASK_COLORS = [
      { bg: 'bg-blue-200 border-blue-400 text-blue-900', dot: '#93c5fd' },
      { bg: 'bg-red-200 border-red-400 text-red-900', dot: '#fca5a5' },
      { bg: 'bg-amber-200 border-amber-400 text-amber-900', dot: '#fcd34d' },
      { bg: 'bg-green-200 border-green-400 text-green-900', dot: '#86efac' },
      { bg: 'bg-teal-200 border-teal-400 text-teal-900', dot: '#5eead4' },
      { bg: 'bg-purple-200 border-purple-400 text-purple-900', dot: '#d8b4fe' },
      { bg: 'bg-pink-200 border-pink-400 text-pink-900', dot: '#f9a8d4' },
      { bg: 'bg-orange-200 border-orange-400 text-orange-900', dot: '#fdba74' },
    ];
    let selectedColorIndex = 0;
    let taskIdCounter = tasks.length + 1;

    window.openAddTaskModal = () => {
      document.getElementById('add-task-modal').classList.remove('hidden');
      document.getElementById('new-task-title').value = '';
      document.getElementById('new-task-duration').value = 1;
      document.getElementById('new-task-deadline').value = '';
      selectedColorIndex = 0;
      renderColorPicker();
      setTimeout(() => document.getElementById('new-task-title').focus(), 100);
    };

    window.closeAddTaskModal = () => {
      document.getElementById('add-task-modal').classList.add('hidden');
    };

    const renderColorPicker = () => {
      document.getElementById('color-picker').innerHTML = TASK_COLORS.map((c, i) => `
        <button onclick="selectColor(${i})" class="w-8 h-8 rounded-full border-2 transition-all ${i === selectedColorIndex ? 'border-gray-800 scale-110 ring-2 ring-offset-1 ring-gray-400' : 'border-transparent hover:scale-105'}" style="background: ${c.dot};"></button>
      `).join('');
    };

    window.selectColor = (i) => {
      selectedColorIndex = i;
      renderColorPicker();
    };

    window.addNewTask = () => {
      const title = document.getElementById('new-task-title').value.trim();
      const duration = parseInt(document.getElementById('new-task-duration').value) || 1;
      const deadlineVal = document.getElementById('new-task-deadline').value;
      if (!title) { document.getElementById('new-task-title').focus(); return; }

      tasks.push({
        id: 't' + (++taskIdCounter),
        title,
        color: TASK_COLORS[selectedColorIndex].bg,
        assigneeId: null,
        startDate: null,
        endDate: null,
        duration: Math.max(1, duration),
        deadline: deadlineVal || null,
      });

      closeAddTaskModal();
      renderApp();
    };

    // --- 複製工作 ---
    window.duplicateTask = (taskId) => {
      const source = tasks.find(t => t.id === taskId);
      if (!source) return;
      tasks.push({
        id: 't' + (++taskIdCounter),
        title: source.title,
        color: source.color,
        assigneeId: source.assigneeId,
        startDate: source.startDate,
        endDate: source.endDate,
        duration: source.duration,
        deadline: source.deadline,
      });
      renderApp();
    };

    // --- 編輯工作 ---
    let editingTaskId = null;
    let editColorIndex = 0;

    window.openEditTaskModal = (taskId) => {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      editingTaskId = taskId;
      document.getElementById('edit-task-modal').classList.remove('hidden');
      document.getElementById('edit-task-title').value = task.title;
      document.getElementById('edit-task-duration').value = task.duration;
      document.getElementById('edit-task-deadline').value = task.deadline || '';
      editColorIndex = TASK_COLORS.findIndex(c => c.bg === task.color);
      if (editColorIndex < 0) editColorIndex = 0;
      renderEditColorPicker();
      setTimeout(() => document.getElementById('edit-task-title').focus(), 100);
    };

    window.closeEditTaskModal = () => {
      document.getElementById('edit-task-modal').classList.add('hidden');
      editingTaskId = null;
    };

    const renderEditColorPicker = () => {
      document.getElementById('edit-color-picker').innerHTML = TASK_COLORS.map((c, i) => `
        <button onclick="selectEditColor(${i})" class="w-8 h-8 rounded-full border-2 transition-all ${i === editColorIndex ? 'border-gray-800 scale-110 ring-2 ring-offset-1 ring-gray-400' : 'border-transparent hover:scale-105'}" style="background: ${c.dot};"></button>
      `).join('');
    };

    window.selectEditColor = (i) => {
      editColorIndex = i;
      renderEditColorPicker();
    };

    window.saveEditTask = () => {
      const task = tasks.find(t => t.id === editingTaskId);
      if (!task) return;
      const title = document.getElementById('edit-task-title').value.trim();
      if (!title) { document.getElementById('edit-task-title').focus(); return; }

      const newDuration = Math.max(1, parseInt(document.getElementById('edit-task-duration').value) || 1);
      const deadlineVal = document.getElementById('edit-task-deadline').value;

      task.title = title;
      task.color = TASK_COLORS[editColorIndex].bg;
      task.deadline = deadlineVal || null;

      // 更新工期：若已排定，調整 endDate
      if (task.startDate) {
        const newEnd = addDays(parseDate(task.startDate), newDuration - 1);
        // 不超過 deadline
        if (task.deadline && newEnd > parseDate(task.deadline)) {
          task.endDate = task.deadline;
        } else {
          task.endDate = formatDate(newEnd);
        }
        task.duration = getDaysDiff(parseDate(task.startDate), parseDate(task.endDate)) + 1;
      } else {
        task.duration = newDuration;
      }

      closeEditTaskModal();
      renderApp();
    };

    window.deleteEditingTask = () => {
      if (!editingTaskId) return;
      tasks = tasks.filter(t => t.id !== editingTaskId);
      closeEditTaskModal();
      renderApp();
    };

    // --- 切換模式 ---
    window.toggleViewMode = () => {
      viewMode = viewMode === 'horizontal' ? 'vertical' : 'horizontal';
      const btn = document.getElementById('view-mode-btn');
      btn.querySelector('span').textContent = viewMode === 'horizontal' ? '直式' : '橫式';
      renderApp();
      setTimeout(scrollToToday, 50);
    };

    // --- 拖曳縮放事件狀態 (Resize Logic) ---
    let resizingTaskId = null;
    let resizeDirection = null;
    let resizeStartPos = 0;
    let resizeStartStartObj = null;
    let resizeStartEndObj = null;

    window.initResize = (e, taskId, direction) => {
      e.stopPropagation();
      e.preventDefault();
      resizingTaskId = taskId;
      resizeDirection = direction;
      resizeStartPos = viewMode === 'horizontal' ? e.pageX : e.pageY;
      const task = tasks.find(t => t.id === taskId);
      resizeStartStartObj = parseDate(task.startDate);
      resizeStartEndObj = parseDate(task.endDate);
      const cursorClass = viewMode === 'horizontal' ? 'cursor-ew-resize' : 'cursor-ns-resize';
      document.body.classList.add(cursorClass, 'select-none');
      window.addEventListener('mousemove', handleResizeMove);
      window.addEventListener('mouseup', stopResize);
    };

    window.handleResizeMove = (e) => {
      if (!resizingTaskId) return;
      const cellSize = viewMode === 'horizontal' ? CELL_WIDTH : V_ROW_HEIGHT;
      const pos = viewMode === 'horizontal' ? e.pageX : e.pageY;
      const delta = pos - resizeStartPos;
      const deltaDays = Math.round(delta / cellSize);
      const task = tasks.find(t => t.id === resizingTaskId);

      // horizontal: right=end, left=start; vertical: bottom=end, top=start
      if (resizeDirection === 'right' || resizeDirection === 'bottom') {
        let newEnd = addDays(resizeStartEndObj, deltaDays);
        if (newEnd < parseDate(task.startDate)) newEnd = parseDate(task.startDate);
        if (task.deadline && newEnd > parseDate(task.deadline)) newEnd = parseDate(task.deadline);
        task.endDate = formatDate(newEnd);
      } else {
        let newStart = addDays(resizeStartStartObj, deltaDays);
        if (newStart > parseDate(task.endDate)) newStart = parseDate(task.endDate);
        task.startDate = formatDate(newStart);
      }
      task.duration = getDaysDiff(parseDate(task.startDate), parseDate(task.endDate)) + 1;

      const tooltip = document.getElementById('resize-tooltip');
      tooltip.style.display = 'block';
      tooltip.style.left = e.pageX + 'px';
      tooltip.style.top = e.pageY + 'px';
      tooltip.textContent = `${task.startDate} ~ ${task.endDate}（${task.duration} 天）`;

      renderApp();
    };

    window.stopResize = () => {
      resizingTaskId = null;
      document.body.classList.remove('cursor-ew-resize', 'cursor-ns-resize', 'select-none');
      document.getElementById('resize-tooltip').style.display = 'none';
      window.removeEventListener('mousemove', handleResizeMove);
      window.removeEventListener('mouseup', stopResize);
    };

    // --- 拖曳移動事件處理 (Drag & Drop Logic) ---
    window.handleDragStart = (e, taskId) => {
      if (e.target.classList.contains('resize-handle')) { e.preventDefault(); return; }
      e.dataTransfer.setData('taskId', taskId);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => { e.target.style.opacity = '0.4'; }, 0);
    };

    window.handleDragEnd = (e) => { e.target.style.opacity = '1'; };

    window.handleDragOver = (e, targetId, isPool = false) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const el = document.getElementById(targetId);
      if (el) el.classList.add(isPool ? 'drag-over-pool' : 'drag-over-zone');
    };

    window.handleDragLeave = (e, targetId, isPool = false) => {
      e.preventDefault();
      const el = document.getElementById(targetId);
      if (el) el.classList.remove(isPool ? 'drag-over-pool' : 'drag-over-zone');
    };

    window.handleDrop = (e, assigneeId, dateStr, targetId, isPool = false) => {
      e.preventDefault();
      const el = document.getElementById(targetId);
      if (el) el.classList.remove(isPool ? 'drag-over-pool' : 'drag-over-zone');

      const taskId = e.dataTransfer.getData('taskId');
      if (!taskId) return;
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      if (!assigneeId || !dateStr) {
        task.assigneeId = null;
        task.startDate = null;
        task.endDate = null;
      } else {
        const newStart = parseDate(dateStr);
        const duration = task.startDate ? (getDaysDiff(parseDate(task.startDate), parseDate(task.endDate)) + 1) : task.duration;
        let newEnd = addDays(newStart, duration - 1);

        // 截止日期限制
        if (task.deadline) {
          const dl = parseDate(task.deadline);
          if (newEnd > dl) newEnd = dl;
          if (newStart > dl) { renderApp(); return; } // 起始日已超過 deadline，拒絕放置
        }

        task.assigneeId = assigneeId;
        task.startDate = formatDate(newStart);
        task.endDate = formatDate(newEnd);
        task.duration = getDaysDiff(newStart, newEnd) + 1;
      }
      renderApp();
    };

    // --- 捲動到今天 ---
    window.scrollToToday = () => {
      const scrollEl = document.getElementById('gantt-scroll');
      const todayOffset = getDaysDiff(timelineStart, TODAY);
      if (viewMode === 'horizontal') {
        scrollEl.scrollLeft = todayOffset * CELL_WIDTH - scrollEl.clientWidth / 3;
      } else {
        scrollEl.scrollTop = todayOffset * V_ROW_HEIGHT - scrollEl.clientHeight / 3;
      }
    };

    // --- 無限延伸邏輯 ---
    const checkAndExtend = () => {
      if (isExtending) return;
      const scrollEl = document.getElementById('gantt-scroll');

      if (viewMode === 'horizontal') {
        const totalWidth = getDaysDiff(timelineStart, timelineEnd) * CELL_WIDTH + NAME_COL_WIDTH;
        const scrollRight = totalWidth - scrollEl.scrollLeft - scrollEl.clientWidth;

        if (scrollRight < EDGE_THRESHOLD) {
          isExtending = true;
          timelineEnd = addDays(timelineEnd, EXTEND_DAYS);
          renderApp();
          isExtending = false;
        }
        if (scrollEl.scrollLeft < EDGE_THRESHOLD) {
          isExtending = true;
          timelineStart = addDays(timelineStart, -EXTEND_DAYS);
          renderApp();
          scrollEl.scrollLeft += EXTEND_DAYS * CELL_WIDTH;
          isExtending = false;
        }
      } else {
        const totalHeight = getDaysDiff(timelineStart, timelineEnd) * V_ROW_HEIGHT + 60;
        const scrollBottom = totalHeight - scrollEl.scrollTop - scrollEl.clientHeight;

        if (scrollBottom < EDGE_THRESHOLD) {
          isExtending = true;
          timelineEnd = addDays(timelineEnd, EXTEND_DAYS);
          renderApp();
          isExtending = false;
        }
        if (scrollEl.scrollTop < EDGE_THRESHOLD) {
          isExtending = true;
          timelineStart = addDays(timelineStart, -EXTEND_DAYS);
          renderApp();
          scrollEl.scrollTop += EXTEND_DAYS * V_ROW_HEIGHT;
          isExtending = false;
        }
      }
    };

    // --- 更新表頭日期範圍顯示 ---
    const updateDateDisplay = () => {
      const scrollEl = document.getElementById('gantt-scroll');
      let fromDate, toDate;
      if (viewMode === 'horizontal') {
        const leftDay = Math.floor(scrollEl.scrollLeft / CELL_WIDTH);
        const visibleCols = Math.ceil(scrollEl.clientWidth / CELL_WIDTH);
        fromDate = addDays(timelineStart, Math.max(0, leftDay));
        toDate = addDays(timelineStart, leftDay + visibleCols);
      } else {
        const topDay = Math.floor(scrollEl.scrollTop / V_ROW_HEIGHT);
        const visibleRows = Math.ceil(scrollEl.clientHeight / V_ROW_HEIGHT);
        fromDate = addDays(timelineStart, Math.max(0, topDay));
        toDate = addDays(timelineStart, topDay + visibleRows);
      }
      document.getElementById('date-range-display').textContent =
        `${formatDate(fromDate)} ~ ${formatDate(toDate)}`;
    };

    // --- 計算重疊避免遮蔽 (泳道演算法) ---
    const getColleagueLanes = (colleagueId) => {
      const colleagueTasks = tasks.filter(t => t.assigneeId === colleagueId && t.startDate);
      const sorted = [...colleagueTasks].sort((a, b) => parseDate(a.startDate) - parseDate(b.startDate));
      const lanes = [];
      const taskLayouts = {};

      sorted.forEach(task => {
        const start = parseDate(task.startDate).getTime();
        const end = parseDate(task.endDate).getTime();
        let placed = false;
        for (let i = 0; i < lanes.length; i++) {
          if (start > lanes[i]) {
            lanes[i] = end;
            taskLayouts[task.id] = i;
            placed = true;
            break;
          }
        }
        if (!placed) {
          lanes.push(end);
          taskLayouts[task.id] = lanes.length - 1;
        }
      });

      return { taskLayouts, totalLanes: Math.max(1, lanes.length) };
    };

    // --- 渲染共用：待分配任務池 ---
    const renderPool = () => {
      const unassignedTasks = tasks.filter(t => !t.assigneeId || !t.startDate);
      document.getElementById('unassigned-count').textContent = unassignedTasks.length;

      const poolHtml = unassignedTasks.length === 0
        ? `<div class="w-full flex items-center justify-center text-gray-400 text-sm py-2">已全數排定</div>`
        : unassignedTasks.map(task => `
          <div
            draggable="true"
            ondragstart="handleDragStart(event, '${task.id}')"
            ondragend="handleDragEnd(event)"
            class="shrink-0 p-3 border rounded shadow-sm cursor-move hover:shadow-md transition-shadow ${task.color}"
            style="min-width: 200px; max-width: 260px;"
          >
            <div class="flex items-center">
              <i data-lucide="grip-vertical" class="mr-2 w-4 h-4 opacity-50 flex-shrink-0"></i>
              <div class="min-w-0 flex-1">
                <div class="text-sm font-bold leading-tight truncate">${task.title}</div>
                <div class="mt-1 text-xs opacity-75 flex items-center space-x-2">
                  <span class="flex items-center space-x-1"><i data-lucide="clock" class="w-3 h-3"></i><span>工期: ${task.duration} 天</span></span>
                  ${task.deadline ? `<span class="flex items-center space-x-1 text-red-700"><i data-lucide="alert-circle" class="w-3 h-3"></i><span>截止: ${task.deadline.slice(5)}</span></span>` : ''}
                </div>
              </div>
            </div>
          </div>
        `).join('');
      document.getElementById('pool-zone').innerHTML = poolHtml;
    };

    // ========== 橫式渲染 ==========
    const renderHorizontal = () => {
      const totalDays = getDaysDiff(timelineStart, timelineEnd);
      const viewDays = Array.from({ length: totalDays }).map((_, i) => addDays(timelineStart, i));
      const todayStr = formatDate(TODAY);

      // X 軸表頭
      let headerHtml = `
        <div class="w-56 shrink-0 border-r bg-gray-50 p-3 font-semibold text-gray-600 sticky left-0 z-20 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">
          同仁 \\ 日期
        </div>
      `;
      viewDays.forEach(day => {
        const dateStr = formatDate(day);
        const isToday = dateStr === todayStr;
        const isMonday = day.getDay() === 1;
        headerHtml += `
          <div class="shrink-0 border-r flex flex-col items-center justify-center py-1.5 ${isToday ? 'bg-blue-50 text-blue-700' : 'text-gray-600'} ${isMonday ? 'border-l-2 border-l-gray-300' : ''}" style="width: ${CELL_WIDTH}px">
            <span class="text-xs opacity-70">${isMonday || day.getDate() === 1 ? `${day.getMonth() + 1}月` : ''}</span>
            <span class="font-mono text-base ${isToday ? 'font-bold' : ''}">${String(day.getDate()).padStart(2, '0')} ${DAY_NAMES[day.getDay()]}</span>
          </div>
        `;
      });
      document.getElementById('gantt-header').innerHTML = headerHtml;
      document.getElementById('gantt-header').className = 'flex border-b bg-white sticky top-0 z-30 shadow-sm';

      // Y 軸同仁與網格
      let bodyHtml = '';
      colleagues.forEach(colleague => {
        const { taskLayouts, totalLanes } = getColleagueLanes(colleague.id);
        const dynamicRowHeight = Math.max(ROW_MIN_HEIGHT, totalLanes * (TASK_HEIGHT + TASK_GAP) + 20);

        let rowHtml = `
          <div class="flex border-b relative group">
            <div class="w-56 shrink-0 border-r bg-white p-4 sticky left-0 z-20 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] group-hover:bg-gray-50 transition-colors">
              <div class="flex items-center space-x-3">
                <div class="bg-gray-100 p-2 rounded-full text-gray-500"><i data-lucide="user" class="w-5 h-5"></i></div>
                <div>
                  <div class="font-bold text-gray-800">${colleague.name}</div>
                  <div class="text-xs text-gray-500">${colleague.role}</div>
                </div>
              </div>
            </div>
            <div class="flex relative" style="height: ${dynamicRowHeight}px">
        `;

        viewDays.forEach(day => {
          const dateStr = formatDate(day);
          const isWeekend = day.getDay() === 0 || day.getDay() === 6;
          const isToday = dateStr === todayStr;
          const isMonday = day.getDay() === 1;
          const cellId = `cell-${colleague.id}-${dateStr}`;
          rowHtml += `
            <div id="${cellId}" class="shrink-0 border-r transition-colors ${isWeekend ? 'bg-gray-100/50' : ''} ${isToday ? 'bg-blue-50/40' : ''} ${isMonday ? 'border-l-2 border-l-gray-300' : ''}" style="width: ${CELL_WIDTH}px"
              ondragover="handleDragOver(event, '${cellId}')" ondragleave="handleDragLeave(event, '${cellId}')" ondrop="handleDrop(event, '${colleague.id}', '${dateStr}', '${cellId}')"></div>
          `;
        });

        const todayOffset = getDaysDiff(timelineStart, TODAY);
        if (todayOffset >= 0 && todayOffset < totalDays) {
          const todayX = todayOffset * CELL_WIDTH + CELL_WIDTH / 2;
          rowHtml += `<div class="absolute top-0 bottom-0 w-0.5 bg-red-400 z-[5] pointer-events-none" style="left: ${todayX}px;"></div>`;
        }

        const assignedTasks = tasks.filter(t => t.assigneeId === colleague.id && t.startDate);
        assignedTasks.forEach(task => {
          const startObj = parseDate(task.startDate);
          const endObj = parseDate(task.endDate);
          if (endObj < timelineStart || startObj > timelineEnd) return;

          const offsetDays = getDaysDiff(timelineStart, startObj);
          const durationDays = getDaysDiff(startObj, endObj) + 1;
          const leftOffset = offsetDays * CELL_WIDTH;
          const width = durationDays * CELL_WIDTH;
          const topOffset = 10 + (taskLayouts[task.id] || 0) * (TASK_HEIGHT + TASK_GAP);
          const isResizing = (resizingTaskId === task.id);
          const transitionClass = isResizing ? '' : 'transition-all';

          rowHtml += `
            <div draggable="true" ondragstart="handleDragStart(event, '${task.id}')" ondragend="handleDragEnd(event)"
              class="task-bar horizontal group absolute rounded border shadow-sm cursor-move overflow-hidden whitespace-nowrap text-ellipsis flex items-center ${transitionClass} hover:brightness-95 hover:shadow-md z-10 ${task.color}"
              style="left: ${leftOffset}px; width: ${width - 8}px; top: ${topOffset}px; height: ${TASK_HEIGHT}px; margin-left: 4px;"
              title="${task.title} (${task.startDate} ~ ${task.endDate})">
              <div class="resize-handle absolute left-0 top-0 bottom-0 w-3 cursor-ew-resize rounded-l z-20" onmousedown="initResize(event, '${task.id}', 'left')"></div>
              <i data-lucide="grip-vertical" class="ml-3.5 mr-1 w-3.5 h-3.5 opacity-50 flex-shrink-0"></i>
              <span class="text-xs font-bold leading-none truncate flex-1">${task.title}</span>
              <button onclick="event.stopPropagation(); openEditTaskModal('${task.id}')" class="opacity-0 group-hover:opacity-100 shrink-0 p-0.5 hover:bg-black/10 rounded transition-opacity" title="編輯">
                <i data-lucide="pencil" class="w-3 h-3"></i>
              </button>
              <button onclick="event.stopPropagation(); duplicateTask('${task.id}')" class="opacity-0 group-hover:opacity-100 shrink-0 p-0.5 hover:bg-black/10 rounded mr-1 transition-opacity" title="複製">
                <i data-lucide="copy" class="w-3 h-3"></i>
              </button>
              <div class="resize-handle absolute right-0 top-0 bottom-0 w-3 cursor-ew-resize rounded-r z-20" onmousedown="initResize(event, '${task.id}', 'right')"></div>
            </div>
          `;

          // 橫式 deadline 標記線
          if (task.deadline) {
            const dlOffset = getDaysDiff(timelineStart, parseDate(task.deadline));
            const dlX = (dlOffset + 1) * CELL_WIDTH; // deadline 當天結束位置
            if (dlX > 0) {
              rowHtml += `<div class="absolute z-[6] pointer-events-none" style="left: ${dlX - 1}px; top: ${topOffset - 2}px; height: ${TASK_HEIGHT + 4}px; width: 2px; background: #ef4444; border-radius: 1px;" title="截止: ${task.deadline}"></div>`;
            }
          }
        });

        rowHtml += `</div></div>`;
        bodyHtml += rowHtml;
      });

      document.getElementById('gantt-body').innerHTML = bodyHtml;
    };

    // ========== 直式渲染 ==========
    const renderVertical = () => {
      const totalDays = getDaysDiff(timelineStart, timelineEnd);
      const viewDays = Array.from({ length: totalDays }).map((_, i) => addDays(timelineStart, i));
      const todayStr = formatDate(TODAY);

      // 表頭：左上角 + 同仁欄
      let headerHtml = `
        <div class="shrink-0 border-r border-b bg-gray-50 p-2 font-semibold text-gray-600 sticky left-0 top-0 z-30 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]" style="width: ${V_DATE_COL_WIDTH}px; height: 56px;">
          日期 \\ 同仁
        </div>
      `;
      colleagues.forEach(colleague => {
        const { totalLanes } = getColleagueLanes(colleague.id);
        const colW = Math.max(V_COL_WIDTH, totalLanes * (V_TASK_WIDTH + 8) + 16);
        headerHtml += `
          <div class="shrink-0 border-r border-b bg-white flex items-center justify-center sticky top-0 z-10 shadow-sm" style="width: ${colW}px; height: 56px;">
            <div class="flex items-center space-x-2">
              <div class="bg-gray-100 p-1.5 rounded-full text-gray-500"><i data-lucide="user" class="w-4 h-4"></i></div>
              <div>
                <div class="font-bold text-gray-800 text-sm">${colleague.name}</div>
                <div class="text-xs text-gray-500">${colleague.role}</div>
              </div>
            </div>
          </div>
        `;
      });
      document.getElementById('gantt-header').innerHTML = headerHtml;
      document.getElementById('gantt-header').className = 'flex bg-white sticky top-0 z-30 shadow-sm';

      // 網格主體：每列 = 一天
      let bodyHtml = '';
      viewDays.forEach(day => {
        const dateStr = formatDate(day);
        const isWeekend = day.getDay() === 0 || day.getDay() === 6;
        const isToday = dateStr === todayStr;
        const isMonday = day.getDay() === 1;

        let rowHtml = `<div class="flex ${isMonday ? 'border-t-2 border-t-gray-300' : 'border-t'} relative" style="height: ${V_ROW_HEIGHT}px;">`;

        // 左側日期標籤（sticky）
        rowHtml += `
          <div class="shrink-0 border-r flex items-center justify-center sticky left-0 z-20 text-sm font-mono
            ${isToday ? 'bg-blue-50 text-blue-700 font-bold' : 'bg-white text-gray-600'}
            ${isWeekend ? 'bg-gray-50' : ''}"
            style="width: ${V_DATE_COL_WIDTH}px;">
            <span>${isMonday || day.getDate() === 1 ? `${day.getMonth() + 1}/` : ''}${String(day.getDate()).padStart(2, '0')} ${DAY_NAMES[day.getDay()]}</span>
          </div>
        `;

        // 每位同仁的格子
        colleagues.forEach(colleague => {
          const { totalLanes } = getColleagueLanes(colleague.id);
          const colW = Math.max(V_COL_WIDTH, totalLanes * (V_TASK_WIDTH + 8) + 16);
          const cellId = `cell-${colleague.id}-${dateStr}`;
          rowHtml += `
            <div id="${cellId}" class="shrink-0 border-r transition-colors ${isWeekend ? 'bg-gray-100/30' : ''} ${isToday ? 'bg-blue-50/30' : ''}" style="width: ${colW}px;"
              ondragover="handleDragOver(event, '${cellId}')" ondragleave="handleDragLeave(event, '${cellId}')" ondrop="handleDrop(event, '${colleague.id}', '${dateStr}', '${cellId}')">
            </div>
          `;
        });
        rowHtml += `</div>`;
        bodyHtml += rowHtml;
      });

      // 今日紅色橫線
      const todayOffset = getDaysDiff(timelineStart, TODAY);
      if (todayOffset >= 0 && todayOffset < totalDays) {
        const todayY = todayOffset * V_ROW_HEIGHT + V_ROW_HEIGHT / 2;
        bodyHtml += `<div class="absolute h-0.5 bg-red-400 z-[5] pointer-events-none" style="top: ${todayY}px; left: ${V_DATE_COL_WIDTH}px; right: 0;"></div>`;
      }

      // 絕對定位任務條（直式）
      colleagues.forEach((colleague, colIndex) => {
        const { taskLayouts, totalLanes } = getColleagueLanes(colleague.id);
        // 計算此同仁欄的 x 起始位置
        let colLeft = V_DATE_COL_WIDTH;
        for (let ci = 0; ci < colIndex; ci++) {
          const { totalLanes: tl } = getColleagueLanes(colleagues[ci].id);
          colLeft += Math.max(V_COL_WIDTH, tl * (V_TASK_WIDTH + 8) + 16);
        }

        const assignedTasks = tasks.filter(t => t.assigneeId === colleague.id && t.startDate);
        assignedTasks.forEach(task => {
          const startObj = parseDate(task.startDate);
          const endObj = parseDate(task.endDate);
          if (endObj < timelineStart || startObj > timelineEnd) return;

          const offsetDays = getDaysDiff(timelineStart, startObj);
          const durationDays = getDaysDiff(startObj, endObj) + 1;
          const topOffset = offsetDays * V_ROW_HEIGHT + 2;
          const height = durationDays * V_ROW_HEIGHT - 4;
          const lane = taskLayouts[task.id] || 0;
          const leftOffset = colLeft + 8 + lane * (V_TASK_WIDTH + 8);
          const isResizing = (resizingTaskId === task.id);
          const transitionClass = isResizing ? '' : 'transition-all';

          // 取得純色 class（去掉 bg- 前綴取色系）
          bodyHtml += `
            <div draggable="true" ondragstart="handleDragStart(event, '${task.id}')" ondragend="handleDragEnd(event)"
              class="task-bar vertical absolute rounded border shadow-sm cursor-move overflow-hidden flex flex-col items-start justify-start p-1.5 ${transitionClass} hover:brightness-95 hover:shadow-md z-10 ${task.color}"
              style="left: ${leftOffset}px; width: ${V_TASK_WIDTH}px; top: ${topOffset}px; height: ${height}px;"
              title="${task.title} (${task.startDate} ~ ${task.endDate})">
              <div class="resize-handle absolute left-0 right-0 top-0 h-2.5 cursor-ns-resize rounded-t z-20" onmousedown="initResize(event, '${task.id}', 'top')"></div>
              <div class="flex items-start justify-between w-full mt-1">
                <span class="text-xs font-bold leading-tight line-clamp-2 flex-1">${task.title}</span>
                <div class="flex shrink-0 opacity-0 hover:opacity-100 transition-opacity" style="margin-top: -2px;">
                <button onclick="event.stopPropagation(); openEditTaskModal('${task.id}')" class="p-0.5 hover:bg-black/10 rounded" title="編輯">
                  <i data-lucide="pencil" class="w-3 h-3"></i>
                </button>
                <button onclick="event.stopPropagation(); duplicateTask('${task.id}')" class="p-0.5 hover:bg-black/10 rounded" title="複製">
                  <i data-lucide="copy" class="w-3 h-3"></i>
                </button>
                </div>
              </div>
              <span class="text-[10px] opacity-60 mt-auto">${task.duration}天${task.deadline ? ' | 截止' + task.deadline.slice(5) : ''}</span>
              <div class="resize-handle absolute left-0 right-0 bottom-0 h-2.5 cursor-ns-resize rounded-b z-20" onmousedown="initResize(event, '${task.id}', 'bottom')"></div>
            </div>
          `;

          // 直式 deadline 標記線（水平紅線在任務條範圍內）
          if (task.deadline) {
            const dlOffset = getDaysDiff(timelineStart, parseDate(task.deadline));
            const dlY = (dlOffset + 1) * V_ROW_HEIGHT;
            bodyHtml += `<div class="absolute z-[6] pointer-events-none" style="left: ${leftOffset}px; top: ${dlY - 1}px; width: ${V_TASK_WIDTH}px; height: 2px; background: #ef4444; border-radius: 1px;" title="截止: ${task.deadline}"></div>`;
          }
        });
      });

      document.getElementById('gantt-body').innerHTML = `<div class="relative">${bodyHtml}</div>`;
    };

    // --- 主渲染入口 ---
    const renderApp = () => {
      renderPool();
      if (viewMode === 'horizontal') {
        renderHorizontal();
      } else {
        renderVertical();
      }
      lucide.createIcons();
      updateDateDisplay();
    };

    // --- 系統初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
      renderApp();
      setTimeout(scrollToToday, 50);

      const scrollEl = document.getElementById('gantt-scroll');
      scrollEl.addEventListener('scroll', () => {
        updateDateDisplay();
        checkAndExtend();
      });
    });

  </script>
</body>

</html>
